<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ACE-Step MaaS Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="flex flex-col h-screen font-mono bg-[#050505] text-zinc-300">
    <header class="h-14 border-b border-zinc-800 flex items-center justify-between px-6 bg-[#111]">
        <div class="flex items-center gap-3 text-[#ccff00] font-bold tracking-tighter">ACE-STEP // MaaS</div>
        <nav class="flex gap-4 h-full">
            <button class="tab-btn h-full px-4 text-[#ccff00] border-b-2 border-[#ccff00] text-xs uppercase" data-target="view-dashboard">Dashboard</button>
            <button class="tab-btn h-full px-4 text-zinc-500 text-xs uppercase" data-target="view-producer">Producer</button>
            <button class="tab-btn h-full px-4 text-zinc-500 text-xs uppercase" data-target="view-3d">3D Engine</button>
        </nav>
    </header>
    <main class="flex-1 relative overflow-hidden">
        <div id="view-dashboard" class="view-panel h-full w-full p-6"><textarea id="prompt-input" class="w-full h-40 bg-black border border-zinc-800 text-[#ccff00] p-4 rounded outline-none focus:border-[#ccff00]" placeholder="Enter audio concept..."></textarea></div>
        <div id="view-producer" class="view-panel h-full w-full hidden p-6"><div class="h-full border border-zinc-800 rounded-lg p-4 bg-[#111]">Producer Controls Ready</div></div>
        <div id="view-3d" class="view-panel h-full w-full hidden"><div id="3d-container" class="w-full h-full"></div></div>
    </main>
    <footer class="h-20 border-t border-zinc-800 bg-[#111] flex items-center justify-between px-8">
        <button id="btn-render" class="px-8 py-3 bg-zinc-900 border border-[#ccff00] text-[#ccff00] font-bold hover:bg-[#ccff00] hover:text-black transition-all">RENDER LOOP</button>
    </footer>
    <script type="module" src="./js/state.js"></script>
    <script type="module" src="./js/api.js"></script>
    <script type="module" src="./js/ui.js"></script>
    <script type="module" src="./js/three_engine.js"></script>
</body>
</html>
